<!DOCTYPE html>
<html>
<head>
    <title>Microphone & Speech Permission Bridge</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #fafafa; color: #333; }
        .status-box { padding: 15px; border-radius: 5px; background: #eef4ff; border: 1px solid #b2d0ff; font-weight: bold; margin-bottom: 15px; }
        .live-box { font-size: 18px; font-weight: bold; color: #d0342c; margin-top: 10px; min-height: 24px; }
    </style>
</head>
<body>
    <h3>Portal Communication Pipeline</h3>
    <div id="status" class="status-box">Connecting to main workspace portal...</div>
    <div id="liveSpeech" class="live-box"></div>

    <script>
        let recognition = null;
        let finalTranscript = "";
        let speechActive = false;
        const portalSource = window.opener;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechLib = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechLib();
            
            recognition.continuous = true; 
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + " ";
                    }
                }
                document.getElementById('liveSpeech').innerText = `Heard: "${finalTranscript.trim()}"`;
            };

            recognition.onerror = (e) => {
                console.error("Speech API Error", e);
                document.getElementById('status').innerText = "Recognition processing error.";
            };

            recognition.onend = () => {
                if (speechActive) {
                    try { recognition.start(); } catch(e){}
                }
            };
        } else {
            document.getElementById('status').innerText = "Web Speech API not supported.";
        }

        window.addEventListener("message", (event) => {
            if (!event.data || !event.data.command) return;

            if (event.data.command === "INIT_MIC") {
                if (portalSource) portalSource.postMessage({ status: "MIC_READY" }, "*");
                document.getElementById('status').innerText = "Connected to Portal Workbook. Ready.";
            }

            if (event.data.command === "START_AUTO_SPEECH" && recognition) {
                finalTranscript = "";
                speechActive = true;
                document.getElementById('liveSpeech').innerText = "";
                recognition.lang = event.data.lang || 'en-AU'; 
                try {
                    recognition.start();
                    document.getElementById('status').innerText = `Listening active (${recognition.lang})...`;
                } catch(e) { console.log(e); }
            }

            if (event.data.command === "STOP_AUTO_SPEECH" && recognition) {
                speechActive = false;
                try {
                    recognition.stop();
                } catch(e) { console.log(e); }
                
                setTimeout(() => {
                    if (portalSource) {
                        portalSource.postMessage({
                            status: "TRANSCRIPT_OUTPUT",
                            text: finalTranscript.trim()
                        }, "*");
                    }
                    document.getElementById('status').innerText = "Speech captured! Transmitted to Sheets.";
                }, 400); 
            }
        });
    </script>
</body>
</html>
